<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-title >
      Game Deals
    </ion-title>
    <small>CRYSTAL CLEAR SAVINGS</small>
    <ion-searchbar placeholder="Search for games..." [debounce]="500" (ionInput)="onSearch($event)"></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="isLoading">
    <ion-skeleton-text animated style="width: 100%; height: 200px; border-radius: 16px; margin-bottom: 16px;"></ion-skeleton-text>
    <ion-skeleton-text animated style="width: 100%; height: 200px; border-radius: 16px;"></ion-skeleton-text>
  </div>

  <div *ngIf="!isLoading && !searchQuery">
    <h2 class="title-header">🔥 Top 5 Deals</h2>
    <div class="horizontal-scroll">
      <app-card 
        *ngFor="let deal of topDeals" 
        [deal]="deal" 
        (favoriteClicked)="saveFavorite($event)">
      </app-card>
    </div>
  </div>

  <div *ngIf="!isLoading && searchQuery && searchResults.length > 0">
    <h2 class="title-header">Results for "{{ searchQuery }}"</h2>
    <ion-grid>
      <ion-row>
        <ion-col size="12" size-md="6" *ngFor="let deal of searchResults">
          <ion-card class="deal-card glass-effect">
            <img [src]="deal.thumb" alt="Cover" />
            <ion-card-header>
              <ion-card-title>{{ deal.title }}</ion-card-title>
              <ion-card-subtitle>${{ deal.salePrice }}</ion-card-subtitle>
            </ion-card-header>
            <ion-button fill="clear" (click)="saveFavorite(deal.gameID)">
              <ion-icon name="heart-outline" slot="icon-only" color="danger"></ion-icon>
            </ion-button>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <div class="empty-state" *ngIf="!isLoading && searchQuery && searchResults.length === 0">
    <ion-icon name="game-controller-outline"></ion-icon>
    <h3>No games found</h3>
    <p>We couldn't find any deals for "{{ searchQuery }}". Try another title.</p>
  </div>
</ion-content>
