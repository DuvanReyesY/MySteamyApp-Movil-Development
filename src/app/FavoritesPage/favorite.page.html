<app-header 
  [isSearchDisabled]="true">
</app-header>

<ion-content class="ion-padding" [fullscreen]="true">

  <div *ngIf="isLoading">
    <ion-skeleton-text animated style="width: 100%; height: 300px; border-radius: 16px;"></ion-skeleton-text>
  </div>

  <div *ngIf="favoriteDeal">
    <h2 class="title-header">💖 Your Favorite Game</h2>
    <div class="favorite-container">
      <app-card 
        [deal]="favoriteDeal" 
        [isFavorite]="true" 
        (favoriteClicked)="removeFavorite()">
      </app-card>
    </div>
  </div>

  <div class="empty-state" *ngIf="!isLoading && !favoriteDeal">
    <ion-icon name="heart-half-outline"></ion-icon>
    <h3>No favorite game yet</h3>
    <p>Go to the Deals tab and tap the heart icon on any game to save it here!</p>
    <ion-button routerLink="/tabs/deals">Browse Deals</ion-button>
  </div>

</ion-content>
