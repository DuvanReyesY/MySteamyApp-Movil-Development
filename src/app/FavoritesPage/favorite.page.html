<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>My Favorite</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="isLoading">
    <ion-skeleton-text animated style="width: 100%; height: 300px; border-radius: 16px;"></ion-skeleton-text>
  </div>

  <div *ngIf="!isLoading && favoriteGameDetails">
    <ion-card class="glass-effect">
      <img [src]="favoriteGameDetails.info.thumb" alt="Cover" />
      <ion-card-header>
        <ion-card-title>{{ favoriteGameDetails.info.title }}</ion-card-title>
        <ion-card-subtitle>Best Deals Currently Available:</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <ion-list>
          <ion-item *ngFor="let deal of favoriteGameDetails.deals | slice:0:3">
            <ion-label>
              <h2>${{ deal.price }}</h2>
              <p>Store ID: {{ deal.storeID }}</p>
            </ion-label>
          </ion-item>
        </ion-list>
      </ion-card-content>
    </ion-card>
  </div>

  <div class="empty-state" *ngIf="!isLoading && !favoriteGameDetails">
    <ion-icon name="heart-half-outline"></ion-icon>
    <h3>No favorite game yet</h3>
    <p>Go to the Deals tab and tap the heart icon on any game to track its prices here!</p>
    <ion-button routerLink="/tabs/deals">Browse Deals</ion-button>
  </div>

</ion-content>
